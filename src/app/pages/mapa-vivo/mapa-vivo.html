<div class="dashboard-layout">
  
  <aside class="sidebar-panel">
    <div class="panel-header">
      <h2>Trans<strong class="text-orange">Kelion</strong></h2>
      <p>Logística Satelital</p>
    </div>

    <div class="form-card">
      <div class="tip-box">
        💡 <span>Tip: Haz clic en el mapa para marcar puntos.</span>
      </div>

      <div class="input-group">
        <label>Origen</label>
        <div class="input-wrapper">
          <input type="text" #origenInput placeholder="Escribe o haz clic en el mapa..." class="google-input">
          <button class="btn-locate" (click)="obtenerMiUbicacion()" [disabled]="cargandoUbicacion">
            {{ cargandoUbicacion ? '⌛' : '🎯' }}
          </button>
        </div>
      </div>

      <div class="input-group">
        <label>Destino</label>
        <div class="input-wrapper">
          <input type="text" #destinoInput placeholder="Hacia donde vamos..." class="google-input">
        </div>
      </div>

      <div class="actions-grid">
        <button (click)="calcularRutaVisual()" class="btn-calculate">Trazar Ruta</button>
        <button (click)="limpiarMapa()" class="btn-clear">Limpiar</button>
      </div>
    </div>

    <div class="results-card" *ngIf="rutaCalculada">
      <div class="res-item">
        <span class="res-label">Kilometraje</span>
        <span class="res-val">{{ distanciaReal }}</span>
      </div>
      <div class="res-item">
        <span class="res-label">Tiempo Estimado</span>
        <span class="res-val text-orange">{{ tiempoReal }}</span>
      </div>
      <button (click)="guardarViajeEnBackend()" class="btn-confirm">💾 Guardar en Sistema</button>
    </div>
  </aside>

  <main class="map-container" *ngIf="isBrowser">
    <google-map 
      height="100%" 
      width="100%" 
      [center]="center" 
      [zoom]="zoom" 
      [options]="mapOptions"
      (mapClick)="onMapClick($event)">
    </google-map>
  </main>

</div>
