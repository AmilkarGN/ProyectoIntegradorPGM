<div class="dashboard-layout">
  
  <aside class="sidebar-panel">
    <div class="panel-header">
      <h2>Trans<strong class="text-orange">Kelion</strong></h2>
      <p>Análisis de Riesgos</p>
    </div>

    <div class="form-card mb-4">
      <h3>Área de Monitoreo</h3>
      <div class="region-grid mt-3">
        <button class="btn-region" [class.active]="regionActiva === 'nacional'" (click)="volarARegion('nacional')">🇧🇴 Nacional</button>
        <button class="btn-region" [class.active]="regionActiva === 'eje-troncal'" (click)="volarARegion('eje-troncal')">🛣️ Eje Troncal</button>
        <button class="btn-region" [class.active]="regionActiva === 'el-alto'" (click)="volarARegion('el-alto')">🏭 El Alto</button>
        <button class="btn-region" [class.active]="regionActiva === 'frontera'" (click)="volarARegion('frontera')">🛂 Desaguadero</button>
      </div>
    </div>

    <div class="form-card">
      <h3>Filtros de Inteligencia</h3>
      <div class="filter-options mt-3">
        <button class="btn-filter" [class.active]="filtroActivo === 'todos'" (click)="cambiarFiltro('todos')">🌐 Riesgo Acumulado</button>
        <button class="btn-filter" [class.active]="filtroActivo === 'bloqueos'" (click)="cambiarFiltro('bloqueos')">🚧 Bloqueos Frecuentes</button>
        <button class="btn-filter" [class.active]="filtroActivo === 'accidentes'" (click)="cambiarFiltro('accidentes')">⚠️ Zonas de Accidente</button>
      </div>
    </div>

    <div class="results-card bg-dark">
      <h3 class="text-white">Estado: 
        <span *ngIf="regionActiva === 'nacional'">Bolivia</span>
        <span *ngIf="regionActiva === 'eje-troncal'">Ruta Troncal</span>
        <span *ngIf="regionActiva === 'el-alto'">El Alto</span>
        <span *ngIf="regionActiva === 'frontera'">Desaguadero</span>
      </h3>
      <div class="status-indicator">
        <div class="pulse-dot red"></div>
        <span>Monitoreo Activo</span>
      </div>
      <p class="text-sm mt-2 text-gray" *ngIf="regionActiva === 'el-alto'">Precaución: Múltiples alertas en La Ceja.</p>
      <p class="text-sm mt-2 text-gray" *ngIf="regionActiva !== 'el-alto'">Operaciones regulares. Revise filtros para detalles.</p>
    </div>
  </aside>

  <main class="map-container" *ngIf="isBrowser">
    <google-map height="100%" width="100%" [center]="center" [zoom]="zoom" [options]="mapOptions"></google-map>
  </main>

</div>
