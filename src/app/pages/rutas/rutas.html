<div class="crud-container fade-in">
  <div class="crud-header">
    <h2>Catálogo de Rutas Principales (Macro)</h2>
    <button class="btn-action btn-add" (click)="abrirModal()">+ Definir Nueva Ruta</button>
  </div>

  <table class="crud-table">
    <thead>
      <tr>
        <th>Nombre de la Ruta</th>
        <th>Origen</th>
        <th>Destino</th>
        <th>Distancia Oficial</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of rutas">
        <td><strong>{{ r.nombre_ruta }}</strong></td>
        <td>{{ r.origen_detalles?.nombre }}</td>
        <td>{{ r.destino_detalles?.nombre }}</td>
        <td>
          <span class="badge badge-ruta" style="background: #e0f2fe; color: #0369a1;">
            🛣️ {{ r.distancia_km }} km
          </span>
        </td>
        <td class="actions-column">
          <button class="btn-action btn-edit" (click)="abrirModal(r)">✏️</button>
          <button class="btn-action btn-delete">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="crud-modal-overlay" *ngIf="mostrarModal">
    <div class="crud-modal">
      <h3>Gestionar Ruta</h3>
      <form (ngSubmit)="guardar()">
        <div class="form-group">
          <label>Origen</label>
          <select name="origen" [(ngModel)]="rutaActual.origen" (change)="calcularDistancia()" required>
            <option *ngFor="let c of ciudades" [value]="c.id">{{ c.nombre }} ({{ c.pais }})</option>
          </select>
        </div>
        <div class="form-group">
          <label>Destino</label>
          <select name="destino" [(ngModel)]="rutaActual.destino" (change)="calcularDistancia()" required>
            <option *ngFor="let c of ciudades" [value]="c.id">{{ c.nombre }} ({{ c.pais }})</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nombre Identificador de Ruta</label>
          <input type="text" name="nombre" [(ngModel)]="rutaActual.nombre_ruta" placeholder="Ej: Troncal La Paz - Santa Cruz" required>
        </div>
        <div class="form-group">
          <label>Distancia (Km) - <small>Calculado automáticamente por Google</small></label>
          <input type="number" name="dist" [(ngModel)]="rutaActual.distancia_km" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" (click)="mostrarModal = false">Cerrar</button>
          <button type="submit" class="btn-save">Guardar Ruta</button>
        </div>
      </form>
    </div>
  </div>
</div>
