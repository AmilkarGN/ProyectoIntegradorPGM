<div class="login-page">
  <div class="login-wrapper">
    
    <div class="brand-section">
<img src="/assets/images/logo.png" alt="Logo de Transkelion" class="main-logo">>
      <h1 class="company-name">Transkelion</h1>
      <p class="company-slogan">Logística Inteligente y En Tiempo Real</p>
    </div> <div class="form-section">
      
      <div *ngIf="!necesita2FA">
        <h2>¡Bienvenido!</h2>
        <p class="form-subtitle">Ingresa tus credenciales para continuar.</p>

        <form class="login-form" (ngSubmit)="iniciarSesion()">
          <div class="input-group">
            <input type="text" name="username" placeholder="Usuario" [(ngModel)]="username" required>
          </div>
          
          <div class="input-group">
            <input type="password" name="password" placeholder="Contraseña" [(ngModel)]="password" required>
          </div>

          <button type="submit" class="btn-primary">
            Ingresar
          </button>
        </form>
      </div>

      <div *ngIf="necesita2FA">
        <h2>Verificación de Seguridad</h2>
        <p class="form-subtitle">Hemos enviado un código de 6 dígitos a tu correo.</p>

        <form class="login-form" (ngSubmit)="verificarCodigo()">
          <div class="input-group">
            <input type="text" name="codigo2FA" placeholder="Ej: 123456" [(ngModel)]="codigo2FA" maxlength="6" required>
          </div>

          <div class="action-group">
            <label class="remember-me">
              <input type="checkbox" name="recordarDispositivo" [(ngModel)]="recordarDispositivo">
              Recordar este dispositivo
            </label>
          </div>

          <button type="submit" class="btn-primary">
            Verificar y Entrar
          </button>
        </form>
      </div>

    </div> </div>
</div>
