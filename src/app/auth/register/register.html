<div class="page-container page-enter-right">
  
  <div class="auth-panel">
    
    <div class="logo-animation-container">
      <img src="/assets/images/logo.png" alt="Transkelion" class="tk-logo">
    </div>

    <div class="brand-header">
      <h2>Crear tu Cuenta</h2>
      <p>Únete a la red Transkelion</p>
    </div>

    <div class="auth-card">
      <form>
        
        <label class="input-label">Nombre Completo</label>
        <div class="input-group">
          <input type="text" placeholder="Ej. Amilkar GN">
        </div>
        
        <label class="input-label">Correo Electrónico</label>
        <div class="input-group">
          <input type="email" placeholder="correo@ejemplo.com">
        </div>
        
        <label class="input-label">Usuario Deseado</label>
        <div class="input-group">
          <input type="text" placeholder="Crea un nombre de usuario">
        </div>
        
        <label class="input-label">Contraseña</label>
        <div class="input-group password-group">
          <input [type]="verContrasena ? 'text' : 'password'" placeholder="Mínimo 8 caracteres">
          <button type="button" class="btn-eye" (click)="toggleContrasena()">
            {{ verContrasena ? '🙈' : '👁️' }}
          </button>
        </div>
        
        <label class="input-label">Confirmar Contraseña</label>
        <div class="input-group password-group">
          <input [type]="verConfirmarContrasena ? 'text' : 'password'" placeholder="Reingresa tu contraseña">
          <button type="button" class="btn-eye" (click)="toggleConfirmarContrasena()">
            {{ verConfirmarContrasena ? '🙈' : '👁️' }}
          </button>
        </div>
        
        <button type="button" class="btn-primary">Registrar Cuenta</button>
      </form>

      <div class="footer-links">
        <p>¿Ya tienes una cuenta? <a routerLink="/login" class="link-action">Inicia sesión</a></p>
      </div>
    </div>

  </div>
</div>
